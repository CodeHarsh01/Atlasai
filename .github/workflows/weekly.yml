name: ATLAS Weekly Report

on:
  schedule:
    # Saturday 6 PM IST
    - cron: "30 12 * * 6"

  workflow_dispatch:

jobs:

  weekly:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: |
          pip install -r requirements.txt

      - run: python weekly.py